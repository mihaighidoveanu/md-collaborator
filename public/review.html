<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review</title>
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f6f8fa; color: #24292e; }

    #header {
      background: #fff;
      border-bottom: 1px solid #e1e4e8;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #header-left { display: flex; flex-direction: column; gap: 2px; }
    #pr-label { font-size: 12px; color: #6a737d; }
    #pr-title { font-size: 16px; font-weight: 600; }
    #approve-btn {
      background: #2da44e;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #approve-btn:hover:not(:disabled) { background: #2c974b; }
    #approve-btn:disabled { background: #94d3a2; cursor: not-allowed; }
    #approve-btn.submitted { background: #6a737d; }

    #header-actions { display: flex; gap: 8px; align-items: center; }
    #save-btn {
      background: #fff;
      color: #24292e;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #save-btn:hover:not(:disabled) { background: #f6f8fa; }
    #save-btn:disabled { color: #8c959f; cursor: not-allowed; }

    #layout { display: flex; height: calc(100vh - 57px); }

    #sidebar {
      width: 260px;
      min-width: 200px;
      background: #fff;
      border-right: 1px solid #e1e4e8;
      overflow-y: auto;
      padding: 12px 0;
    }
    #sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6a737d; padding: 0 16px 8px; }
    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      color: #24292e;
      border-left: 3px solid transparent;
      word-break: break-all;
    }
    .file-item:hover { background: #f6f8fa; }
    .file-item.active { background: #f1f8ff; border-left-color: #0366d6; font-weight: 600; }
    .file-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #e1e4e8; }
    .file-item.edited .dot { background: #f9826c; }

    #editor-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #no-file {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6a737d;
      font-size: 15px;
    }
    #editor-wrap { flex: 1; min-height: 0; overflow: hidden; }
    #editor-wrap .toastui-editor-defaultUI { height: 100%; }

    /* Reference pane: shows what moved upstream, sitting above the editor so the
       reviewer can re-apply their changes. Collapsible and height-bounded. */
    #reference-panel { flex-shrink: 0; display: flex; flex-direction: column; max-height: 45vh; border-bottom: 1px solid #e1e4e8; }
    #reference-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 20px;
      background: #fff8e6;
      border-bottom: 1px solid #f2dca7;
      font-size: 13px;
      color: #6a5500;
      flex-shrink: 0;
    }
    #reference-toggle {
      border: 1px solid #d0d7de;
      background: #fff;
      color: #24292e;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    #reference-toggle:hover { background: #f6f8fa; }
    #reference-body {
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12.5px;
      line-height: 1.5;
      background: #fff;
    }
    #reference-panel.collapsed #reference-body { display: none; }

    /* Two-way unified diff rows */
    .diff-row { display: flex; padding: 0 16px; white-space: pre-wrap; word-break: break-word; }
    .diff-row .diff-gutter { width: 16px; flex-shrink: 0; color: #6a737d; user-select: none; }
    .diff-row .diff-text { flex: 1; }
    .diff-row.add { background: #e6ffed; }
    .diff-row.add .diff-gutter { color: #22863a; }
    .diff-row.del { background: #ffeef0; }
    .diff-row.del .diff-gutter { color: #cb2431; }
    .diff-row.eq { color: #57606a; }

    /* Three-way column header + rows */
    #threeway-head { display: flex; border-bottom: 1px solid #e1e4e8; background: #f6f8fa; position: sticky; top: 0; }
    #threeway-head .tw-col {
      flex: 1;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6a737d;
      border-right: 1px solid #e1e4e8;
    }
    #threeway-head .tw-col:last-child { border-right: none; }
    .tw-row { display: flex; }
    .tw-row.conflict { background: #fff8e6; }
    .tw-cell {
      flex: 1;
      padding: 1px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      border-right: 1px solid #eaecef;
      border-bottom: 1px solid #f3f4f6;
    }
    .tw-cell:last-child { border-right: none; }
    .tw-cell.empty { background: #fafbfc; }
    .tw-cell.changed { background: #e6ffed; }
    .tw-row.conflict .tw-cell.changed { background: #ffe9b3; }

    #status-banner {
      display: none;
      padding: 16px 24px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
    }
    #status-banner.submitted { background: #dcffe4; color: #22863a; display: block; }
    #status-banner.revoked { background: #ffeef0; color: #cb2431; display: block; }

    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #24292e;
      color: #fff;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    .mermaid-rendered {
      padding: 16px;
      margin: 0;
      background: #fafbfc;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      text-align: center;
      user-select: none;
    }
    .mermaid-rendered svg { max-width: 100%; height: auto; }
    .mermaid-rendered.error {
      background: #ffeef0;
      border-color: #f9c0c4;
      color: #cb2431;
      font-size: 13px;
      font-family: monospace;
      white-space: pre-wrap;
      text-align: left;
      padding: 12px 16px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(27,31,35,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-box {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 24px rgba(27,31,35,0.2);
    }
    .modal-box h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .modal-box p { font-size: 14px; line-height: 1.5; margin-bottom: 12px; }
    .modal-file-list {
      list-style: none;
      background: #f6f8fa;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    .modal-file-list li {
      font-size: 13px;
      font-family: monospace;
      padding: 6px 12px;
      border-bottom: 1px solid #e1e4e8;
    }
    .modal-file-list li:last-child { border-bottom: none; }
    .modal-warning {
      font-size: 13px;
      background: #ffeef0;
      border: 1px solid #f9c0c4;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 20px;
      color: #24292e;
    }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-actions button {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
    }
    #modal-back-btn { background: #fff; color: #24292e; border-color: #d0d7de; }
    #modal-back-btn:hover { background: #f6f8fa; }
    #modal-approve-btn { background: #cf222e; color: #fff; border-color: #cf222e; }
    #modal-approve-btn:hover { background: #a40e26; }
  </style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <span id="pr-label">Loading…</span>
    <span id="pr-title"></span>
  </div>
  <div id="header-actions">
    <button id="save-btn" disabled>Save</button>
    <button id="approve-btn" disabled>Submit for PR</button>
  </div>
</div>

<div id="status-banner"></div>

<div id="layout">
  <div id="sidebar">
    <h3>Changed files</h3>
    <div id="file-list"></div>
  </div>
  <div id="editor-area">
    <div id="no-file">Select a file to review</div>
    <div id="reference-panel" style="display:none">
      <div id="reference-header">
        <span id="reference-label"></span>
        <button id="reference-toggle">Hide</button>
      </div>
      <div id="reference-body"></div>
    </div>
    <div id="editor-wrap" style="display:none"></div>
  </div>
</div>

<div id="toast"></div>

<div id="incomplete-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3>Some files haven't been opened yet</h3>
    <p>You haven't reviewed the following files:</p>
    <ul class="modal-file-list" id="unvisited-list"></ul>
    <p class="modal-warning"><strong>Once you submit, you will not be able to edit any files.</strong> Do you want to go back and review these files first?</p>
    <div class="modal-actions">
      <button id="modal-back-btn">Go Back and Review</button>
      <button id="modal-approve-btn">Submit Anyway</button>
    </div>
  </div>
</div>

<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  if (window.mermaid) {
    window.mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
  }
</script>
<script>
  const token = location.pathname.split('/').pop();
  let sessionData = null;
  let editor = null;
  let currentFile = null;
  let saveTimer = null;
  let mermaidCounter = 0;
  const fileOriginals = {}; // filePath → raw content from GitHub

  async function renderMermaidInto(dom, source) {
    if (!window.mermaid) { dom.textContent = 'Mermaid library not loaded.'; dom.classList.add('error'); return; }
    if (!source.trim()) { dom.innerHTML = '<em style="color:#888">(empty mermaid block)</em>'; return; }
    try {
      const id = 'mermaid-svg-' + (++mermaidCounter);
      const { svg } = await window.mermaid.render(id, source);
      dom.classList.remove('error');
      dom.innerHTML = svg;
    } catch (e) {
      dom.classList.add('error');
      dom.textContent = 'Mermaid render failed: ' + (e && e.message ? e.message : e);
    }
  }

  // ProseMirror NodeView for fenced code blocks. Mermaid blocks render as
  // a non-editable SVG; other languages get a minimal code-block view so
  // ProseMirror still manages their text. We need to provide our own view
  // for every codeBlock because Toast UI's plugin nodeViews override the
  // built-in CodeBlockView wholesale — there's no super-call to fall back to.
  function codeBlockNodeView(node) {
    if (node.attrs.language === 'mermaid') {
      const dom = document.createElement('div');
      dom.className = 'mermaid-rendered';
      dom.setAttribute('data-language', 'mermaid');
      dom.setAttribute('contenteditable', 'false');
      dom.innerHTML = '<em style="color:#888">rendering…</em>';
      let lastSource = node.textContent;
      renderMermaidInto(dom, lastSource);
      return {
        dom,
        // No contentDOM: ProseMirror still has the code text in its state
        // (so getMarkdown() round-trips), it just doesn't render it.
        stopEvent() { return true; },
        ignoreMutation() { return true; },
        update(updated) {
          if (updated.type !== node.type) return false;
          if (updated.attrs.language !== 'mermaid') return false;
          const src = updated.textContent;
          if (src !== lastSource) { lastSource = src; renderMermaidInto(dom, src); }
          return true;
        },
      };
    }
    const language = node.attrs.language;
    const wrapper = document.createElement('div');
    wrapper.className = 'toastui-editor-ww-code-block';
    wrapper.setAttribute('data-language', language || 'text');
    const pre = document.createElement('pre');
    const code = document.createElement('code');
    if (language) code.setAttribute('data-language', language);
    pre.appendChild(code);
    wrapper.appendChild(pre);
    return { dom: wrapper, contentDOM: code };
  }

  function mermaidPlugin() {
    return { wysiwygNodeViews: { codeBlock: codeBlockNodeView } };
  }

  function showToast(msg, duration = 2000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
  }

  async function api(method, path, body) {
    const res = await fetch(`/review/api/${token}${path}`, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: body !== undefined ? JSON.stringify(body) : undefined,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  function renderFileList(files) {
    const list = document.getElementById('file-list');
    list.innerHTML = '';
    files.forEach(f => {
      const el = document.createElement('div');
      el.className = 'file-item' + (f.edited ? ' edited' : '');
      el.dataset.path = f.path;
      const dot = document.createElement('span');
      dot.className = 'dot';
      const name = document.createElement('span');
      name.textContent = f.path;
      el.appendChild(dot);
      el.appendChild(name);
      el.addEventListener('click', () => openFile(f.path));
      list.appendChild(el);
    });
  }

  function setActiveFile(filePath) {
    document.querySelectorAll('.file-item').forEach(el => {
      el.classList.toggle('active', el.dataset.path === filePath);
    });
  }

  function markFileEdited(filePath) {
    const el = document.querySelector(`.file-item[data-path="${CSS.escape(filePath)}"]`);
    if (el) el.classList.add('edited');
  }

  // Build the unified two-way diff (what moved upstream since last look) into
  // a container element.
  function buildUnifiedDiff(container, rows) {
    const gutter = { eq: ' ', add: '+', del: '-' };
    rows.forEach(r => {
      const row = document.createElement('div');
      row.className = 'diff-row ' + r.type;
      const g = document.createElement('span');
      g.className = 'diff-gutter';
      g.textContent = gutter[r.type] || ' ';
      const t = document.createElement('span');
      t.className = 'diff-text';
      t.textContent = r.text;
      row.appendChild(g);
      row.appendChild(t);
      container.appendChild(row);
    });
  }

  // Build the three-way table (Original | Upstream | Your edits) into a
  // container element.
  function buildThreeWay(container, rows) {
    const head = document.createElement('div');
    head.id = 'threeway-head';
    ['Original', 'Upstream (author)', 'Your edits (re-apply)'].forEach(label => {
      const col = document.createElement('div');
      col.className = 'tw-col';
      col.textContent = label;
      head.appendChild(col);
    });
    container.appendChild(head);
    rows.forEach(r => {
      const row = document.createElement('div');
      row.className = 'tw-row' + (r.conflict ? ' conflict' : '');
      const cell = (text, changed) => {
        const c = document.createElement('div');
        c.className = 'tw-cell' + (text === null ? ' empty' : '') + (changed ? ' changed' : '');
        c.textContent = text === null ? '' : text;
        return c;
      };
      row.appendChild(cell(r.base, false));
      row.appendChild(cell(r.upstream, r.upstreamChanged));
      row.appendChild(cell(r.mine, r.mineChanged));
      container.appendChild(row);
    });
  }

  // Show the reference pane above the editor: a two-way diff of what moved, or
  // the three-way comparison the reviewer re-applies their edits from. The
  // editor still mounts on upstream — the pane is reference, not a gate.
  function showReference(data) {
    const panel = document.getElementById('reference-panel');
    const label = document.getElementById('reference-label');
    const body = document.getElementById('reference-body');
    body.innerHTML = '';
    if (data.view === 'three_way') {
      label.textContent = 'This file also changed upstream while you had unsent edits. Re-apply your changes (right column) on top of the upstream version below.';
      buildThreeWay(body, data.diff || []);
    } else {
      label.textContent = "This file changed since you last looked at it. Here's what moved:";
      buildUnifiedDiff(body, data.diff || []);
    }
    panel.classList.remove('collapsed');
    document.getElementById('reference-toggle').textContent = 'Hide';
    panel.style.display = 'flex';
  }

  function hideReference() {
    document.getElementById('reference-panel').style.display = 'none';
  }

  // Mount the WYSIWYG editor for the current file, loaded with `content` as the
  // editing baseline. Does not touch the reference pane.
  function mountEditor(content) {
    const wrap = document.getElementById('editor-wrap');
    wrap.style.display = 'flex';

    const isSubmitted = sessionData?.status === 'submitted';
    if (editor) editor.destroy();

    editor = new toastui.Editor({
      el: wrap,
      height: '100%',
      initialEditType: 'wysiwyg',
      previewStyle: 'vertical',
      initialValue: content,
      toolbarItems: isSubmitted ? [] : [
        ['heading', 'bold', 'italic', 'strike'],
        ['hr', 'quote'],
        ['ul', 'ol', 'task'],
        ['table', 'link'],
      ],
      usageStatistics: false,
      hideModeSwitch: true,
      plugins: [mermaidPlugin],
    });

    if (isSubmitted) {
      editor.getEditorElements().mdEditor.setAttribute('contenteditable', 'false');
      editor.getEditorElements().wwEditor.setAttribute('contenteditable', 'false');
    } else {
      document.getElementById('save-btn').disabled = false;
      editor.on('change', () => {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveCurrentFile, 1500);
      });
    }
  }

  async function openFile(filePath) {
    if (currentFile === filePath) return;

    // Save pending changes for previous file before switching
    if (currentFile && editor) {
      clearTimeout(saveTimer);
      await saveCurrentFile();
    }

    currentFile = filePath;
    setActiveFile(filePath);

    const data = await api('GET', `/files/${encodeURIComponent(filePath)}`);

    const fileEntry = (sessionData?.files || []).find(f => f.path === filePath);
    if (fileEntry) fileEntry.visited = true;

    document.getElementById('no-file').style.display = 'none';

    const isSubmitted = sessionData?.status === 'submitted';
    // When something moved (two- or three-way), keep the comparison visible as a
    // reference and edit from upstream so the author's changes are never dropped.
    // On a read-only submitted session there's nothing to reconcile.
    const hasReference = (data.view === 'two_way' || data.view === 'three_way') && !isSubmitted;
    const editContent = hasReference ? data.upstream : data.content;

    if (hasReference) showReference(data);
    else hideReference();

    fileOriginals[filePath] = editContent;
    mountEditor(editContent);
  }

  async function saveCurrentFile() {
    if (!currentFile || !editor || sessionData?.status !== 'active') return;
    const content = editor.getMarkdown();
    const originalContent = fileOriginals[currentFile];
    try {
      await api('PUT', `/files/${encodeURIComponent(currentFile)}`, { content, originalContent });
      markFileEdited(currentFile);
    } catch (e) {
      showToast('Save failed: ' + e.message, 3000);
      throw e;
    }
  }

  async function manualSave() {
    const btn = document.getElementById('save-btn');
    clearTimeout(saveTimer);
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      await saveCurrentFile();
      showToast('Saved');
    } catch (e) {
      // toast already shown by saveCurrentFile
    } finally {
      btn.textContent = 'Save';
      btn.disabled = sessionData?.status !== 'active' || !currentFile;
    }
  }

  function showIncompleteModal(unvisitedPaths) {
    return new Promise(resolve => {
      const modal = document.getElementById('incomplete-modal');
      const list = document.getElementById('unvisited-list');
      list.innerHTML = '';
      unvisitedPaths.forEach(p => {
        const li = document.createElement('li');
        li.textContent = p;
        list.appendChild(li);
      });
      modal.style.display = 'flex';

      const backBtn = document.getElementById('modal-back-btn');
      const approveBtn = document.getElementById('modal-approve-btn');

      function cleanup(result) {
        modal.style.display = 'none';
        backBtn.removeEventListener('click', onBack);
        approveBtn.removeEventListener('click', onApprove);
        resolve(result);
      }

      function onBack() { cleanup(false); }
      function onApprove() { cleanup(true); }
      backBtn.addEventListener('click', onBack);
      approveBtn.addEventListener('click', onApprove);
    });
  }

  async function submit() {
    const unvisited = (sessionData?.files || []).filter(f => !f.visited).map(f => f.path);

    if (unvisited.length > 0) {
      const proceed = await showIncompleteModal(unvisited);
      if (!proceed) return;
    } else {
      if (!confirm('Submit your edits as a pull request? You will not be able to edit afterwards.')) return;
    }

    // Save any pending changes first
    clearTimeout(saveTimer);
    await saveCurrentFile();

    const btn = document.getElementById('approve-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    try {
      await api('POST', '/submit');
      sessionData.status = 'submitted';
      showSubmittedState();
      showToast('Submitted for review', 3000);
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Submit for PR';
      showToast('Error: ' + e.message, 4000);
    }
  }

  function showSubmittedState() {
    const btn = document.getElementById('approve-btn');
    btn.textContent = 'Submitted';
    btn.disabled = true;
    btn.classList.add('submitted');

    const banner = document.getElementById('status-banner');
    banner.className = 'submitted';
    banner.textContent = 'Your changes have been submitted for review.';

    // Re-open current file as read-only
    if (currentFile) {
      const path = currentFile;
      currentFile = null;
      openFile(path);
    }
  }

  async function init() {
    try {
      sessionData = await api('GET', '');
    } catch (e) {
      // Session is revoked or invalid — show the error from the server
      document.getElementById('header').innerHTML = `<span style="color:#cb2431;font-weight:600">${e.message}</span>`;
      document.getElementById('layout').style.display = 'none';
      return;
    }

    document.getElementById('pr-label').textContent = `PR #${sessionData.pr_number} · ${sessionData.owner}/${sessionData.repo}`;
    document.getElementById('pr-title').textContent = sessionData.pr_title;

    renderFileList(sessionData.files);

    if (sessionData.status === 'submitted') {
      showSubmittedState();
    } else {
      const approveBtn = document.getElementById('approve-btn');
      approveBtn.disabled = false;
      approveBtn.addEventListener('click', submit);
      document.getElementById('save-btn').addEventListener('click', manualSave);
    }

    // Collapse / expand the reference pane.
    document.getElementById('reference-toggle').addEventListener('click', () => {
      const panel = document.getElementById('reference-panel');
      const collapsed = panel.classList.toggle('collapsed');
      document.getElementById('reference-toggle').textContent = collapsed ? 'Show' : 'Hide';
    });

    // Auto-open first file
    if (sessionData.files.length > 0) {
      openFile(sessionData.files[0].path);
    }
  }

  init();
</script>
</body>
</html>
