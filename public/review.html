<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review</title>
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f6f8fa; color: #24292e; }

    #header {
      background: #fff;
      border-bottom: 1px solid #e1e4e8;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #header-left { display: flex; flex-direction: column; gap: 2px; }
    #pr-label { font-size: 12px; color: #6a737d; }
    #pr-title { font-size: 16px; font-weight: 600; }
    #approve-btn {
      background: #2da44e;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #approve-btn:hover:not(:disabled) { background: #2c974b; }
    #approve-btn:disabled { background: #94d3a2; cursor: not-allowed; }
    #approve-btn.submitted { background: #6a737d; }

    #header-actions { display: flex; gap: 8px; align-items: center; }
    #save-btn {
      background: #fff;
      color: #24292e;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #save-btn:hover:not(:disabled) { background: #f6f8fa; }
    #save-btn:disabled { color: #8c959f; cursor: not-allowed; }

    #layout { display: flex; height: calc(100vh - 57px); }

    #sidebar {
      width: 260px;
      min-width: 200px;
      background: #fff;
      border-right: 1px solid #e1e4e8;
      overflow-y: auto;
      padding: 12px 0;
    }
    #sidebar h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6a737d; padding: 0 16px 8px; }
    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      color: #24292e;
      border-left: 3px solid transparent;
      word-break: break-all;
    }
    .file-item:hover { background: #f6f8fa; }
    .file-item.active { background: #f1f8ff; border-left-color: #0366d6; font-weight: 600; }
    .file-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #e1e4e8; }
    .file-item.edited .dot { background: #f9826c; }

    #editor-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    #no-file {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6a737d;
      font-size: 15px;
    }
    #editor-wrap { flex: 1; min-height: 0; min-width: 0; overflow: hidden; }
    #editor-wrap .toastui-editor-defaultUI { height: 100%; }

    /* Reference pane: shows what moved upstream so the reviewer can re-apply
       their changes. Stacked above the editor for the informational two-way
       diff; collapsible and height-bounded. */
    #reference-panel { flex-shrink: 0; display: flex; flex-direction: column; max-height: 45vh; border-bottom: 1px solid #e1e4e8; }

    /* Three-way reconcile: lay the reference beside the editor (left), so the
       reviewer reads their changes on the left and re-applies them on the right. */
    #editor-area.reconcile { flex-direction: row; }
    #editor-area.reconcile #reference-panel {
      flex-direction: column;
      max-height: none;
      width: 42%;
      min-width: 320px;
      border-bottom: none;
      border-right: 1px solid #e1e4e8;
    }
    #editor-area.reconcile #reference-panel.collapsed { width: auto; min-width: 0; }
    #reference-panel.collapsed #reference-label { display: none; }
    .tw-legend { display: flex; flex-wrap: wrap; gap: 14px; padding: 6px 12px; background: #f6f8fa; border-bottom: 1px solid #e1e4e8; }
    .tw-legend .tw-key {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      color: #57606a;
      display: inline-flex;
      align-items: center;
    }
    .tw-legend .tw-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 16px;
      height: 16px;
      padding: 0 3px;
      border-radius: 3px;
      margin-right: 5px;
      font-size: 10.5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      border: 1px solid rgba(27,31,35,0.15);
    }
    .tw-legend .tw-key.your .tw-chip { background: #e6ffed; color: #22863a; }
    .tw-legend .tw-key.author .tw-chip { background: #ddf4ff; color: #0969da; }
    .tw-legend .tw-key.conflict .tw-chip { background: #ffe1b3; color: #9a6700; }

    .tw-gutter {
      flex: 0 0 30px;
      text-align: center;
      font-size: 10.5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      border-right: 1px solid #eaecef;
      border-bottom: 1px solid #f3f4f6;
      color: #6a737d;
      user-select: none;
    }
    .tw-gutter.your { background: #e6ffed; color: #22863a; }
    .tw-gutter.author { background: #ddf4ff; color: #0969da; }
    .tw-gutter.conflict { background: #ffe1b3; color: #9a6700; }
    #reference-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 20px;
      background: #fff8e6;
      border-bottom: 1px solid #f2dca7;
      font-size: 13px;
      color: #6a5500;
      flex-shrink: 0;
    }
    #reference-toggle {
      border: 1px solid #d0d7de;
      background: #fff;
      color: #24292e;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    #reference-toggle:hover { background: #f6f8fa; }
    #reference-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12.5px;
      line-height: 1.5;
      background: #fff;
    }
    #reference-panel.collapsed #reference-body { display: none; }

    /* Two-way unified diff rows */
    .diff-row { display: flex; padding: 0 16px; white-space: pre-wrap; word-break: break-word; }
    .diff-row .diff-gutter { width: 16px; flex-shrink: 0; color: #6a737d; user-select: none; }
    .diff-row .diff-text { flex: 1; }
    .diff-row.add { background: #e6ffed; }
    .diff-row.add .diff-gutter { color: #22863a; }
    .diff-row.del { background: #ffeef0; }
    .diff-row.del .diff-gutter { color: #cb2431; }
    .diff-row.eq { color: #57606a; }

    /* Three-way column header + rows */
    #threeway-head { display: flex; border-bottom: 1px solid #e1e4e8; background: #f6f8fa; position: sticky; top: 0; }
    #threeway-head .tw-col {
      flex: 1;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6a737d;
      border-right: 1px solid #e1e4e8;
    }
    #threeway-head .tw-col:last-child { border-right: none; }
    .tw-row { display: flex; }
    .tw-row.conflict { background: #fff8e6; }
    .tw-cell {
      flex: 1;
      padding: 1px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      border-right: 1px solid #eaecef;
      border-bottom: 1px solid #f3f4f6;
    }
    .tw-cell:last-child { border-right: none; }
    .tw-cell.empty { background: #fafbfc; }
    .tw-cell.changed { background: #e6ffed; }
    .tw-cell.upstream { background: #ddf4ff; }
    .tw-row.conflict .tw-cell.changed, .tw-row.conflict .tw-cell.upstream { background: #ffe1b3; }

    #status-banner {
      display: none;
      padding: 16px 24px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
    }
    #status-banner.submitted { background: #dcffe4; color: #22863a; display: block; }
    #status-banner.revoked { background: #ffeef0; color: #cb2431; display: block; }

    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #24292e;
      color: #fff;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    .mermaid-rendered {
      padding: 16px;
      margin: 0;
      background: #fafbfc;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      text-align: center;
      user-select: none;
    }
    .mermaid-rendered svg { max-width: 100%; height: auto; }
    .mermaid-rendered.error {
      background: #ffeef0;
      border-color: #f9c0c4;
      color: #cb2431;
      font-size: 13px;
      font-family: monospace;
      white-space: pre-wrap;
      text-align: left;
      padding: 12px 16px;
    }

    /* Comments */
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #57606a;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 7px 9px;
      cursor: pointer;
    }
    .icon-btn:hover:not(:disabled) { background: #f6f8fa; color: #24292e; }
    .icon-btn:disabled { color: #b1b7bd; cursor: not-allowed; }

    #para-comment-btn {
      position: absolute;
      z-index: 50;
      padding: 3px 5px;
      box-shadow: 0 1px 3px rgba(27,31,35,0.15);
    }

    #comments-panel {
      width: 300px;
      min-width: 300px;
      background: #fff;
      border-left: 1px solid #e1e4e8;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #comments-panel.collapsed { width: 40px; min-width: 40px; }
    #comments-panel.collapsed #comments-body { display: none; }
    #comments-panel.collapsed #comments-header span { display: none; }
    #comments-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #e1e4e8;
      font-size: 13px;
      font-weight: 600;
    }
    #comments-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      color: #6a737d;
      line-height: 1;
    }
    #comments-panel.collapsed #comments-toggle { transform: rotate(180deg); }
    #comments-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    #composer { padding: 12px 14px; border-bottom: 1px solid #e1e4e8; background: #f6f8fa; }
    #composer-context {
      font-size: 12px;
      color: #6a737d;
      margin-bottom: 6px;
      padding-left: 8px;
      border-left: 3px solid #d0d7de;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 60px;
      overflow: hidden;
    }
    #composer-input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 8px;
      font: inherit;
      font-size: 13px;
      resize: vertical;
    }
    #composer-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
    #composer-actions button {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #d0d7de;
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #composer-actions .primary { background: #2da44e; color: #fff; border-color: #2da44e; }
    #composer-actions .primary:hover { background: #2c974b; }

    #comments-list { padding: 8px 0; }
    #comments-empty { padding: 16px 14px; font-size: 13px; color: #6a737d; }
    .comment-item { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; }
    .comment-item.resolved { opacity: 0.6; }
    .comment-anchor {
      font-size: 12px;
      color: #57606a;
      border-left: 3px solid #d0bff0;
      padding: 2px 8px;
      margin-bottom: 6px;
      white-space: pre-wrap;
      word-break: break-word;
      cursor: pointer;
      max-height: 48px;
      overflow: hidden;
    }
    .comment-anchor:hover { background: #faf8ff; }
    .comment-anchor.detached { border-left-color: #e1e4e8; color: #8c959f; font-style: italic; }
    .comment-general { font-size: 11px; color: #6a737d; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
    .comment-body { font-size: 13px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
    .comment-meta { display: flex; align-items: center; gap: 10px; margin-top: 6px; font-size: 11px; color: #8c959f; }
    .comment-meta button { background: none; border: none; padding: 0; cursor: pointer; font-size: 11px; color: #0969da; }
    .comment-meta button:hover { text-decoration: underline; }
    .paragraph-highlight { background: #fff8c5 !important; transition: background 1.5s; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(27,31,35,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-box {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 24px rgba(27,31,35,0.2);
    }
    .modal-box h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .modal-box p { font-size: 14px; line-height: 1.5; margin-bottom: 12px; }
    .modal-file-list {
      list-style: none;
      background: #f6f8fa;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    .modal-file-list li {
      font-size: 13px;
      font-family: monospace;
      padding: 6px 12px;
      border-bottom: 1px solid #e1e4e8;
    }
    .modal-file-list li:last-child { border-bottom: none; }
    .modal-warning {
      font-size: 13px;
      background: #ffeef0;
      border: 1px solid #f9c0c4;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 20px;
      color: #24292e;
    }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-actions button {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid;
    }
    #modal-back-btn { background: #fff; color: #24292e; border-color: #d0d7de; }
    #modal-back-btn:hover { background: #f6f8fa; }
    #modal-approve-btn { background: #cf222e; color: #fff; border-color: #cf222e; }
    #modal-approve-btn:hover { background: #a40e26; }
  </style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <span id="pr-label">Loading…</span>
    <span id="pr-title"></span>
  </div>
  <div id="header-actions">
    <button id="general-comment-btn" class="icon-btn" title="Leave a comment" disabled>
      <svg viewBox="0 0 16 16" width="15" height="15" fill="currentColor"><path d="M3 1.5A1.5 1.5 0 0 0 1.5 3v7A1.5 1.5 0 0 0 3 11.5h2v2.25a.5.5 0 0 0 .82.385L9.4 11.5H13A1.5 1.5 0 0 0 14.5 10V3A1.5 1.5 0 0 0 13 1.5Z"/></svg>
    </button>
    <button id="save-btn" disabled>Save</button>
    <button id="approve-btn" disabled>Submit for PR</button>
  </div>
</div>

<div id="status-banner"></div>

<div id="layout">
  <div id="sidebar">
    <h3>Changed files</h3>
    <div id="file-list"></div>
  </div>
  <div id="editor-area">
    <div id="no-file">Select a file to review</div>
    <div id="reference-panel" style="display:none">
      <div id="reference-header">
        <span id="reference-label"></span>
        <button id="reference-toggle">Hide</button>
      </div>
      <div id="reference-body"></div>
    </div>
    <div id="editor-wrap" style="display:none"></div>
    <button id="para-comment-btn" class="icon-btn" title="Comment on this paragraph" style="display:none">
      <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M3 1.5A1.5 1.5 0 0 0 1.5 3v7A1.5 1.5 0 0 0 3 11.5h2v2.25a.5.5 0 0 0 .82.385L9.4 11.5H13A1.5 1.5 0 0 0 14.5 10V3A1.5 1.5 0 0 0 13 1.5Z"/></svg>
    </button>
  </div>
  <div id="comments-panel">
    <div id="comments-header">
      <span>Comments</span>
      <button id="comments-toggle" title="Collapse">›</button>
    </div>
    <div id="comments-body">
      <div id="composer" style="display:none">
        <div id="composer-context"></div>
        <textarea id="composer-input" placeholder="Leave a comment…" rows="3"></textarea>
        <div id="composer-actions">
          <button id="composer-cancel">Cancel</button>
          <button id="composer-add" class="primary">Comment</button>
        </div>
      </div>
      <div id="comments-list"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="incomplete-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h3>Some files haven't been opened yet</h3>
    <p>You haven't reviewed the following files:</p>
    <ul class="modal-file-list" id="unvisited-list"></ul>
    <p class="modal-warning"><strong>Once you submit, you will not be able to edit any files.</strong> Do you want to go back and review these files first?</p>
    <div class="modal-actions">
      <button id="modal-back-btn">Go Back and Review</button>
      <button id="modal-approve-btn">Submit Anyway</button>
    </div>
  </div>
</div>

<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  if (window.mermaid) {
    window.mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
  }
</script>
<script>
  const token = location.pathname.split('/').pop();
  let sessionData = null;
  let editor = null;
  let currentFile = null;
  let saveTimer = null;
  let mermaidCounter = 0;
  const fileOriginals = {}; // filePath → raw content from GitHub

  async function renderMermaidInto(dom, source) {
    if (!window.mermaid) { dom.textContent = 'Mermaid library not loaded.'; dom.classList.add('error'); return; }
    if (!source.trim()) { dom.innerHTML = '<em style="color:#888">(empty mermaid block)</em>'; return; }
    try {
      const id = 'mermaid-svg-' + (++mermaidCounter);
      const { svg } = await window.mermaid.render(id, source);
      dom.classList.remove('error');
      dom.innerHTML = svg;
    } catch (e) {
      dom.classList.add('error');
      dom.textContent = 'Mermaid render failed: ' + (e && e.message ? e.message : e);
    }
  }

  // ProseMirror NodeView for fenced code blocks. Mermaid blocks render as
  // a non-editable SVG; other languages get a minimal code-block view so
  // ProseMirror still manages their text. We need to provide our own view
  // for every codeBlock because Toast UI's plugin nodeViews override the
  // built-in CodeBlockView wholesale — there's no super-call to fall back to.
  function codeBlockNodeView(node) {
    if (node.attrs.language === 'mermaid') {
      const dom = document.createElement('div');
      dom.className = 'mermaid-rendered';
      dom.setAttribute('data-language', 'mermaid');
      dom.setAttribute('contenteditable', 'false');
      dom.innerHTML = '<em style="color:#888">rendering…</em>';
      let lastSource = node.textContent;
      renderMermaidInto(dom, lastSource);
      return {
        dom,
        // No contentDOM: ProseMirror still has the code text in its state
        // (so getMarkdown() round-trips), it just doesn't render it.
        stopEvent() { return true; },
        ignoreMutation() { return true; },
        update(updated) {
          if (updated.type !== node.type) return false;
          if (updated.attrs.language !== 'mermaid') return false;
          const src = updated.textContent;
          if (src !== lastSource) { lastSource = src; renderMermaidInto(dom, src); }
          return true;
        },
      };
    }
    const language = node.attrs.language;
    const wrapper = document.createElement('div');
    wrapper.className = 'toastui-editor-ww-code-block';
    wrapper.setAttribute('data-language', language || 'text');
    const pre = document.createElement('pre');
    const code = document.createElement('code');
    if (language) code.setAttribute('data-language', language);
    pre.appendChild(code);
    wrapper.appendChild(pre);
    return { dom: wrapper, contentDOM: code };
  }

  function mermaidPlugin() {
    return { wysiwygNodeViews: { codeBlock: codeBlockNodeView } };
  }

  function showToast(msg, duration = 2000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
  }

  async function api(method, path, body) {
    const res = await fetch(`/review/api/${token}${path}`, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: body !== undefined ? JSON.stringify(body) : undefined,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  function renderFileList(files) {
    const list = document.getElementById('file-list');
    list.innerHTML = '';
    files.forEach(f => {
      const el = document.createElement('div');
      el.className = 'file-item' + (f.edited ? ' edited' : '');
      el.dataset.path = f.path;
      const dot = document.createElement('span');
      dot.className = 'dot';
      const name = document.createElement('span');
      name.textContent = f.path;
      el.appendChild(dot);
      el.appendChild(name);
      el.addEventListener('click', () => openFile(f.path));
      list.appendChild(el);
    });
  }

  function setActiveFile(filePath) {
    document.querySelectorAll('.file-item').forEach(el => {
      el.classList.toggle('active', el.dataset.path === filePath);
    });
  }

  function markFileEdited(filePath) {
    const el = document.querySelector(`.file-item[data-path="${CSS.escape(filePath)}"]`);
    if (el) el.classList.add('edited');
  }

  // Build the unified two-way diff (what moved upstream since last look) into
  // a container element.
  function buildUnifiedDiff(container, rows) {
    const gutter = { eq: ' ', add: '+', del: '-' };
    rows.forEach(r => {
      const row = document.createElement('div');
      row.className = 'diff-row ' + r.type;
      const g = document.createElement('span');
      g.className = 'diff-gutter';
      g.textContent = gutter[r.type] || ' ';
      const t = document.createElement('span');
      t.className = 'diff-text';
      t.textContent = r.text;
      row.appendChild(g);
      row.appendChild(t);
      container.appendChild(row);
    });
  }

  // Marker shown in each row's left gutter (GitHub-style), so the signal reads
  // without relying on color alone. Conflicts win over single-sided changes.
  const TW_MARKERS = {
    conflict: { cls: 'conflict', glyph: '⚠' },
    your: { cls: 'your', glyph: '✎' },
    author: { cls: 'author', glyph: '</>' },
  };
  function rowMarker(r) {
    if (r.conflict) return TW_MARKERS.conflict;
    if (r.mineChanged) return TW_MARKERS.your;
    if (r.upstreamChanged) return TW_MARKERS.author;
    return null;
  }

  // Build the reconcile reference: a left gutter marker + two columns
  // (Original | Your edits) the reviewer re-applies onto the upstream content
  // shown in the editor. Color and a left marker carry the signal; a legend
  // explains both:
  //   ✎  green → you edited this line here
  //   </> blue → it came from the developer's commit (the editor has the new version)
  //   ⚠  amber → conflict: you both changed this line
  function buildThreeWay(container, rows) {
    const legend = document.createElement('div');
    legend.className = 'tw-legend';
    [['your', '✎', 'Your edit'], ['author', '</>', 'Developer changed it'], ['conflict', '⚠', 'Conflict (both)']]
      .forEach(([cls, glyph, text]) => {
        const key = document.createElement('span');
        key.className = 'tw-key ' + cls;
        const chip = document.createElement('span');
        chip.className = 'tw-chip';
        chip.textContent = glyph;
        key.appendChild(chip);
        key.appendChild(document.createTextNode(' ' + text));
        legend.appendChild(key);
      });
    container.appendChild(legend);

    const head = document.createElement('div');
    head.id = 'threeway-head';
    const headGutter = document.createElement('div');
    headGutter.className = 'tw-gutter';
    head.appendChild(headGutter);
    ['Original', 'Your edits (re-apply)'].forEach(label => {
      const col = document.createElement('div');
      col.className = 'tw-col';
      col.textContent = label;
      head.appendChild(col);
    });
    container.appendChild(head);

    rows.forEach(r => {
      const row = document.createElement('div');
      row.className = 'tw-row' + (r.conflict ? ' conflict' : '');
      const gutter = document.createElement('div');
      gutter.className = 'tw-gutter';
      const mk = rowMarker(r);
      if (mk) { gutter.classList.add(mk.cls); gutter.textContent = mk.glyph; }
      row.appendChild(gutter);
      const cell = (text, extraClass) => {
        const c = document.createElement('div');
        c.className = 'tw-cell' + (text === null ? ' empty' : '') + (extraClass ? ' ' + extraClass : '');
        c.textContent = text === null ? '' : text;
        return c;
      };
      // Original cell flags an upstream change; Your-edits cell flags your change.
      row.appendChild(cell(r.base, r.upstreamChanged ? 'upstream' : ''));
      row.appendChild(cell(r.mine, r.mineChanged ? 'changed' : ''));
      container.appendChild(row);
    });
  }

  // Show the reference pane above the editor: a two-way diff of what moved, or
  // the three-way comparison the reviewer re-applies their edits from. The
  // editor still mounts on upstream — the pane is reference, not a gate.
  function showReference(data) {
    const area = document.getElementById('editor-area');
    const panel = document.getElementById('reference-panel');
    const label = document.getElementById('reference-label');
    const body = document.getElementById('reference-body');
    body.innerHTML = '';
    if (data.view === 'three_way') {
      // Side-by-side reconcile: reference left, editor (upstream) right.
      area.classList.add('reconcile');
      label.textContent = 'This file also changed upstream while you had unsent edits. Re-apply your changes (right column) in the editor; the left marker and color show your changes, the author’s upstream changes, and conflicts (see legend).';
      buildThreeWay(body, data.diff || []);
    } else {
      // Informational "what moved", stacked above the editor.
      area.classList.remove('reconcile');
      label.textContent = "This file changed since you last looked at it. Here's what moved:";
      buildUnifiedDiff(body, data.diff || []);
    }
    panel.classList.remove('collapsed');
    document.getElementById('reference-toggle').textContent = 'Hide';
    panel.style.display = 'flex';
  }

  function hideReference() {
    document.getElementById('reference-panel').style.display = 'none';
    document.getElementById('editor-area').classList.remove('reconcile');
  }

  // --- Comments ---
  let comments = [];
  let composerAnchor = null;   // { paragraph_index, anchor_text } for anchored, else null
  let hoverBlock = null;

  function isSubmittedSession() { return sessionData?.status === 'submitted'; }
  function proseMirrorRoot() {
    return document.querySelector('#editor-wrap .toastui-editor-ww-container .ProseMirror');
  }
  function relTime(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return 'just now';
    const m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

  async function loadComments() {
    try { comments = await api('GET', '/comments'); }
    catch { comments = []; }
    renderComments();
  }

  // Re-anchor a comment to a current block: prefer its stored index, else find a
  // block whose text still matches; null = detached (paragraph no longer exists).
  function findAnchorEl(c) {
    const root = proseMirrorRoot();
    if (!root || c.anchor_text == null) return null;
    const blocks = Array.from(root.children);
    const byIdx = blocks[c.paragraph_index];
    if (byIdx && byIdx.textContent === c.anchor_text) return byIdx;
    return blocks.find(b => b.textContent === c.anchor_text) || null;
  }

  function highlightParagraph(el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.add('paragraph-highlight');
    setTimeout(() => el.classList.remove('paragraph-highlight'), 1500);
  }

  function renderComments() {
    const list = document.getElementById('comments-list');
    if (!list) return;
    list.innerHTML = '';
    // This file's comments (anchored first, then file-level), then general notes.
    const shown = comments.filter(c => c.file_path === currentFile || c.file_path == null);
    const rank = c => (c.anchor_text != null ? 0 : (c.file_path != null ? 1 : 2));
    shown.sort((a, b) => rank(a) - rank(b) || a.created_at - b.created_at);
    if (!shown.length) {
      const empty = document.createElement('div');
      empty.id = 'comments-empty';
      empty.textContent = 'No comments yet.';
      list.appendChild(empty);
      return;
    }
    const submitted = isSubmittedSession();
    shown.forEach(c => {
      const item = document.createElement('div');
      item.className = 'comment-item' + (c.resolved ? ' resolved' : '');
      if (c.anchor_text != null) {
        const anchorEl = findAnchorEl(c);
        const a = document.createElement('div');
        a.className = 'comment-anchor' + (anchorEl ? '' : ' detached');
        a.textContent = anchorEl ? c.anchor_text : (c.anchor_text + '  — no longer in the document');
        if (anchorEl) a.onclick = () => highlightParagraph(anchorEl);
        item.appendChild(a);
      } else if (c.file_path == null) {
        const g = document.createElement('div');
        g.className = 'comment-general';
        g.textContent = 'General';
        item.appendChild(g);
      }
      const body = document.createElement('div');
      body.className = 'comment-body';
      body.textContent = c.body;
      item.appendChild(body);
      const meta = document.createElement('div');
      meta.className = 'comment-meta';
      const time = document.createElement('span');
      time.textContent = relTime(c.created_at) + (c.resolved ? ' · resolved' : '');
      meta.appendChild(time);
      if (!submitted) {
        const resolveBtn = document.createElement('button');
        resolveBtn.textContent = c.resolved ? 'Unresolve' : 'Resolve';
        resolveBtn.onclick = () => toggleResolve(c);
        meta.appendChild(resolveBtn);
        const delBtn = document.createElement('button');
        delBtn.textContent = 'Delete';
        delBtn.onclick = () => deleteComment(c);
        meta.appendChild(delBtn);
      }
      item.appendChild(meta);
      list.appendChild(item);
    });
  }

  function openComposer(anchor) {
    if (isSubmittedSession()) return;
    composerAnchor = anchor;
    const ctx = document.getElementById('composer-context');
    if (anchor && anchor.anchor_text != null) ctx.textContent = anchor.anchor_text;
    else ctx.textContent = currentFile ? ('General comment on ' + currentFile) : 'General comment';
    document.getElementById('comments-panel').classList.remove('collapsed');
    document.getElementById('composer').style.display = 'block';
    const input = document.getElementById('composer-input');
    input.value = '';
    input.focus();
  }
  function closeComposer() {
    document.getElementById('composer').style.display = 'none';
    composerAnchor = null;
  }
  async function submitComposer() {
    const body = document.getElementById('composer-input').value.trim();
    if (!body) return;
    const payload = { body };
    if (composerAnchor && composerAnchor.anchor_text != null) {
      payload.file_path = currentFile;
      payload.paragraph_index = composerAnchor.paragraph_index;
      payload.anchor_text = composerAnchor.anchor_text;
    } else {
      payload.file_path = currentFile || null;
    }
    try {
      await api('POST', '/comments', payload);
      closeComposer();
      await loadComments();
      showToast('Comment added');
    } catch (e) {
      showToast('Could not add comment: ' + e.message, 3000);
    }
  }
  async function toggleResolve(c) {
    try { await api('PATCH', `/comments/${c.id}`, { resolved: !c.resolved }); await loadComments(); }
    catch (e) { showToast('Failed: ' + e.message, 3000); }
  }
  async function deleteComment(c) {
    if (!confirm('Delete this comment?')) return;
    try { await api('DELETE', `/comments/${c.id}`); await loadComments(); }
    catch (e) { showToast('Failed: ' + e.message, 3000); }
  }

  // Floating "comment on this paragraph" button that follows the hovered block.
  function attachParagraphCommenting() {
    const btn = document.getElementById('para-comment-btn');
    btn.style.display = 'none';
    const root = proseMirrorRoot();
    if (!root || isSubmittedSession()) return;
    const area = document.getElementById('editor-area');
    let hideTimer = null;
    const cancelHide = () => clearTimeout(hideTimer);
    const scheduleHide = () => { hideTimer = setTimeout(() => { btn.style.display = 'none'; }, 200); };

    function topBlockFrom(node) {
      let el = node;
      while (el && el.parentElement !== root) el = el.parentElement;
      return (el && el.parentElement === root) ? el : null;
    }
    root.addEventListener('mousemove', (e) => {
      cancelHide();
      const block = topBlockFrom(e.target);
      if (!block) return;
      hoverBlock = block;
      const br = block.getBoundingClientRect();
      const ar = area.getBoundingClientRect();
      btn.style.display = 'inline-flex';
      btn.style.top = (br.top - ar.top + 2) + 'px';
      btn.style.left = (br.right - ar.left - 30) + 'px';
    });
    root.addEventListener('mouseleave', scheduleHide);
    btn.onmouseenter = cancelHide;
    btn.onmouseleave = scheduleHide;
    btn.onclick = () => {
      if (!hoverBlock) return;
      const blocks = Array.from(root.children);
      const idx = blocks.indexOf(hoverBlock);
      if (idx < 0) return;
      openComposer({ paragraph_index: idx, anchor_text: hoverBlock.textContent });
    };
  }

  // Mount the WYSIWYG editor for the current file, loaded with `content` as the
  // editing baseline. Does not touch the reference pane.
  function mountEditor(content) {
    const wrap = document.getElementById('editor-wrap');
    wrap.style.display = 'flex';

    const isSubmitted = sessionData?.status === 'submitted';
    if (editor) editor.destroy();

    editor = new toastui.Editor({
      el: wrap,
      height: '100%',
      initialEditType: 'wysiwyg',
      previewStyle: 'vertical',
      initialValue: content,
      toolbarItems: isSubmitted ? [] : [
        ['heading', 'bold', 'italic', 'strike'],
        ['hr', 'quote'],
        ['ul', 'ol', 'task'],
        ['table', 'link'],
      ],
      usageStatistics: false,
      hideModeSwitch: true,
      plugins: [mermaidPlugin],
    });

    if (isSubmitted) {
      editor.getEditorElements().mdEditor.setAttribute('contenteditable', 'false');
      editor.getEditorElements().wwEditor.setAttribute('contenteditable', 'false');
    } else {
      document.getElementById('save-btn').disabled = false;
      editor.on('change', () => {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveCurrentFile, 1500);
      });
    }
    attachParagraphCommenting();
    renderComments();
  }

  async function openFile(filePath) {
    if (currentFile === filePath) return;

    // Save pending changes for previous file before switching
    if (currentFile && editor) {
      clearTimeout(saveTimer);
      await saveCurrentFile();
    }

    currentFile = filePath;
    setActiveFile(filePath);

    const data = await api('GET', `/files/${encodeURIComponent(filePath)}`);

    const fileEntry = (sessionData?.files || []).find(f => f.path === filePath);
    if (fileEntry) fileEntry.visited = true;

    document.getElementById('no-file').style.display = 'none';

    const isSubmitted = sessionData?.status === 'submitted';
    // When something moved (two- or three-way), keep the comparison visible as a
    // reference and edit from upstream so the author's changes are never dropped.
    // On a read-only submitted session there's nothing to reconcile.
    const hasReference = (data.view === 'two_way' || data.view === 'three_way') && !isSubmitted;
    const editContent = hasReference ? data.upstream : data.content;

    if (hasReference) showReference(data);
    else hideReference();

    fileOriginals[filePath] = editContent;
    mountEditor(editContent);
  }

  async function saveCurrentFile() {
    if (!currentFile || !editor || sessionData?.status !== 'active') return;
    const content = editor.getMarkdown();
    const originalContent = fileOriginals[currentFile];
    try {
      await api('PUT', `/files/${encodeURIComponent(currentFile)}`, { content, originalContent });
      markFileEdited(currentFile);
    } catch (e) {
      showToast('Save failed: ' + e.message, 3000);
      throw e;
    }
  }

  async function manualSave() {
    const btn = document.getElementById('save-btn');
    clearTimeout(saveTimer);
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      await saveCurrentFile();
      showToast('Saved');
    } catch (e) {
      // toast already shown by saveCurrentFile
    } finally {
      btn.textContent = 'Save';
      btn.disabled = sessionData?.status !== 'active' || !currentFile;
    }
  }

  function showIncompleteModal(unvisitedPaths) {
    return new Promise(resolve => {
      const modal = document.getElementById('incomplete-modal');
      const list = document.getElementById('unvisited-list');
      list.innerHTML = '';
      unvisitedPaths.forEach(p => {
        const li = document.createElement('li');
        li.textContent = p;
        list.appendChild(li);
      });
      modal.style.display = 'flex';

      const backBtn = document.getElementById('modal-back-btn');
      const approveBtn = document.getElementById('modal-approve-btn');

      function cleanup(result) {
        modal.style.display = 'none';
        backBtn.removeEventListener('click', onBack);
        approveBtn.removeEventListener('click', onApprove);
        resolve(result);
      }

      function onBack() { cleanup(false); }
      function onApprove() { cleanup(true); }
      backBtn.addEventListener('click', onBack);
      approveBtn.addEventListener('click', onApprove);
    });
  }

  async function submit() {
    const unvisited = (sessionData?.files || []).filter(f => !f.visited).map(f => f.path);

    if (unvisited.length > 0) {
      const proceed = await showIncompleteModal(unvisited);
      if (!proceed) return;
    } else {
      if (!confirm('Submit your edits as a pull request? You will not be able to edit afterwards.')) return;
    }

    // Save any pending changes first
    clearTimeout(saveTimer);
    await saveCurrentFile();

    const btn = document.getElementById('approve-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    try {
      await api('POST', '/submit');
      sessionData.status = 'submitted';
      showSubmittedState();
      showToast('Submitted for review', 3000);
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Submit for PR';
      showToast('Error: ' + e.message, 4000);
    }
  }

  function showSubmittedState() {
    const btn = document.getElementById('approve-btn');
    btn.textContent = 'Submitted';
    btn.disabled = true;
    btn.classList.add('submitted');

    const banner = document.getElementById('status-banner');
    banner.className = 'submitted';
    banner.textContent = 'Your changes have been submitted for review.';

    // Re-open current file as read-only
    if (currentFile) {
      const path = currentFile;
      currentFile = null;
      openFile(path);
    }
  }

  async function init() {
    try {
      sessionData = await api('GET', '');
    } catch (e) {
      // Session is revoked or invalid — show the error from the server
      document.getElementById('header').innerHTML = `<span style="color:#cb2431;font-weight:600">${e.message}</span>`;
      document.getElementById('layout').style.display = 'none';
      return;
    }

    document.getElementById('pr-label').textContent = `PR #${sessionData.pr_number} · ${sessionData.owner}/${sessionData.repo}`;
    document.getElementById('pr-title').textContent = sessionData.pr_title;

    renderFileList(sessionData.files);

    if (sessionData.status === 'submitted') {
      showSubmittedState();
    } else {
      const approveBtn = document.getElementById('approve-btn');
      approveBtn.disabled = false;
      approveBtn.addEventListener('click', submit);
      document.getElementById('save-btn').addEventListener('click', manualSave);
      document.getElementById('general-comment-btn').disabled = false;
    }

    // Collapse / expand the reference pane.
    document.getElementById('reference-toggle').addEventListener('click', () => {
      const panel = document.getElementById('reference-panel');
      const collapsed = panel.classList.toggle('collapsed');
      document.getElementById('reference-toggle').textContent = collapsed ? 'Show' : 'Hide';
    });

    // Comments: general-comment button, composer, panel collapse.
    document.getElementById('general-comment-btn').addEventListener('click', () => openComposer(null));
    document.getElementById('composer-cancel').addEventListener('click', closeComposer);
    document.getElementById('composer-add').addEventListener('click', submitComposer);
    document.getElementById('comments-toggle').addEventListener('click', () => {
      document.getElementById('comments-panel').classList.toggle('collapsed');
    });
    loadComments();

    // Auto-open first file
    if (sessionData.files.length > 0) {
      openFile(sessionData.files[0].path);
    }
  }

  init();
</script>
</body>
</html>
